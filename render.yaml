# render.yaml — Render Blueprint (Infrastructure as Code)
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: ai-job-tracker-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a random secret
      - key: HF_API_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL after deploying frontend
      - key: PYTHON_VERSION
        value: "3.11.0"
